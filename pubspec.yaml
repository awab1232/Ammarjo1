name: ammar_store
description: AmmarJo — تطبيق المتجر (Firebase).
publish_to: 'none'

# versionName+versionCode للإصدار الأول على Google Play (غيّر +2 عند كل رفع).
version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter

  cupertino_icons: ^1.0.8
  http: ^1.1.0
  image_picker: ^1.1.2
  flutter_image_compress: ^2.4.0
  provider: ^6.1.4
  shared_preferences: ^2.3.5
  url_launcher: ^6.3.1
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  cloud_firestore: ^6.2.0
  firebase_storage: ^13.2.0
  firebase_messaging: ^16.1.3
  firebase_app_check: ^0.4.2
  cloud_functions: ^6.1.0
  flutter_local_notifications: ^18.0.1
  # خط Tajawal للعربية: يُحمَّل عبر الشبكة ويُخزَّن مؤقتاً (لا حاجة لملفات .ttf في المشروع).
  google_fonts: ^8.0.2
  shimmer: ^3.0.0
  crypto: ^3.0.6
  csv: ^6.0.0
  path_provider: ^2.1.5
  share_plus: ^10.1.4
  file_picker: ^8.1.7
  geolocator: ^13.0.2
  cached_network_image: ^3.4.1
  carousel_slider: ^5.0.0
  fl_chart: ^0.70.2
  # Firebase AI Logic (Gemini) — يتطلب firebase_core ^4.6
  firebase_ai: ^3.10.0
  sentry_flutter: 9.17.0
  package_info_plus: ^9.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  test: ^1.26.0
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  image: ^4.5.4

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/logo/icon.png"
  # برتقالي العلامة — يتناسب مع الأيقونة وخلفية أندرويد التكيّفية
  adaptive_icon_background: "#FF6B00"
  adaptive_icon_foreground: "assets/logo/icon_foreground.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/logo/
    - assets/data/construction_calculator_db.json
