<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="AmmarJo منصة تجارة إلكترونية لمواد البناء والخدمات والصيانة.">
  <meta name="theme-color" content="#0E5E6F">
  <meta name="keywords" content="AmmarJo, مواد بناء, متجر, صيانة, مناقصات, تجارة إلكترونية">
  <meta name="author" content="AmmarJo">
  <meta property="og:title" content="AmmarJo">
  <meta property="og:description" content="منصة موحدة للمتاجر والطلبات والمناقصات والخدمات.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://ammarjo.net/">
  <meta name="last-modified" content="2026-04-10T00:00:00Z">
  <meta property="og:updated_time" content="2026-04-10T00:00:00Z">
  <link rel="canonical" href="https://ammarjo.net/">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Ammar Store">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>AmmarJo</title>
  <link rel="manifest" href="manifest.json">
  <script>
    (function () {
      var SITE_URL = "https://ammarjo.net";
      var BOT_REGEX = /(googlebot|bingbot|facebookexternalhit|facebot|twitterbot|linkedinbot|slurp|duckduckbot|yandexbot|applebot)/i;
      var ua = (navigator.userAgent || "").toLowerCase();
      var isBot = BOT_REGEX.test(ua);
      var routePath = (location.pathname || "/").replace(/\/+$/, "") || "/";
      var cleanPath = routePath.split("?")[0].split("#")[0] || "/";
      var currentUrl = SITE_URL + (cleanPath === "/" ? "/" : cleanPath);
      var defaults = {
        title: "AmmarJo - Construction Marketplace",
        description: "AmmarJo marketplace for construction materials, maintenance services, and professional suppliers.",
        canonical: currentUrl,
        lastModified: new Date().toISOString(),
        type: "WebSite",
        text: "AmmarJo marketplace for construction materials and services."
      };
      function upsertMetaByName(name, content) {
        var el = document.head.querySelector('meta[name="' + name + '"]');
        if (!el) {
          el = document.createElement("meta");
          el.setAttribute("name", name);
          document.head.appendChild(el);
        }
        el.setAttribute("content", content);
      }
      function upsertMetaByProperty(prop, content) {
        var el = document.head.querySelector('meta[property="' + prop + '"]');
        if (!el) {
          el = document.createElement("meta");
          el.setAttribute("property", prop);
          document.head.appendChild(el);
        }
        el.setAttribute("content", content);
      }
      function upsertCanonical(url) {
        var el = document.head.querySelector('link[rel="canonical"]');
        if (!el) {
          el = document.createElement("link");
          el.setAttribute("rel", "canonical");
          document.head.appendChild(el);
        }
        el.setAttribute("href", url);
      }
      function upsertJsonLd(obj) {
        var id = "seo-registry-jsonld";
        var el = document.head.querySelector('script[data-seo-id="' + id + '"]');
        if (!el) {
          el = document.createElement("script");
          el.type = "application/ld+json";
          el.setAttribute("data-seo-id", id);
          document.head.appendChild(el);
        }
        el.textContent = JSON.stringify(obj);
      }
      function routeMatch(path, routes) {
        if (routes[path]) return routes[path];
        var product = path.match(/^\/product\/([^\/?#]+)/);
        if (product && routes["/product/:id"]) {
          var item = Object.assign({}, routes["/product/:id"]);
          item.title = (item.titleTemplate || "Product {{id}} | AmmarJo").replace("{{id}}", decodeURIComponent(product[1]));
          item.canonical = SITE_URL + "/product/" + product[1];
          return item;
        }
        var blog = path.match(/^\/blog\/([^\/?#]+)/);
        if (blog && routes["/blog/:slug"]) {
          var b = Object.assign({}, routes["/blog/:slug"]);
          b.title = (b.titleTemplate || "Blog: {{slug}} | AmmarJo").replace("{{slug}}", decodeURIComponent(blog[1]));
          b.canonical = SITE_URL + "/blog/" + blog[1];
          return b;
        }
        var cat = path.match(/^\/category\/([^\/?#]+)/);
        if (cat && routes["/category/:name"]) {
          var c = Object.assign({}, routes["/category/:name"]);
          c.title = (c.titleTemplate || "Category: {{name}} | AmmarJo").replace("{{name}}", decodeURIComponent(cat[1]));
          c.canonical = SITE_URL + "/category/" + cat[1];
          return c;
        }
        return null;
      }
      function applySeo(entry) {
        var seo = Object.assign({}, defaults, entry || {});
        document.title = seo.title;
        upsertMetaByName("description", seo.description);
        upsertMetaByName("last-modified", seo.lastModified);
        upsertMetaByProperty("og:title", seo.title);
        upsertMetaByProperty("og:description", seo.description);
        upsertMetaByProperty("og:url", seo.canonical || currentUrl);
        upsertMetaByProperty("og:type", "website");
        upsertMetaByProperty("og:updated_time", seo.lastModified);
        upsertCanonical(seo.canonical || currentUrl);
        upsertJsonLd({
          "@context": "https://schema.org",
          "@type": seo.type || "WebPage",
          "name": seo.title,
          "description": seo.description,
          "url": seo.canonical || currentUrl,
          "dateModified": seo.lastModified
        });
        if (isBot) {
          var holder = document.getElementById("bot-snapshot");
          if (!holder) {
            holder = document.createElement("main");
            holder.id = "bot-snapshot";
            holder.style.padding = "1rem";
            document.body.appendChild(holder);
          }
          holder.innerHTML = "<h1>" + (seo.title || "") + "</h1><p>" + (seo.text || seo.description || "") + "</p>";
        }
      }
      window.__SEO_IS_BOT__ = isBot;
      window.__SEO_ROUTE_PATH__ = cleanPath;
      fetch("seo_registry.json", { cache: "no-store" })
        .then(function (r) { return r.ok ? r.json() : null; })
        .then(function (data) {
          var routes = (data && data.routes) || {};
          var entry = routeMatch(cleanPath, routes) || routes["/"] || defaults;
          applySeo(entry);
          window.__SEO_READY__ = true;
        })
        .catch(function () {
          applySeo(defaults);
          window.__SEO_READY__ = true;
        });
    })();
  </script>
</head>
<body>
  <script>
    (function () {
      var isBot = !!window.__SEO_IS_BOT__;
      if (isBot) {
        return;
      }
      var run = function () {
        var script = document.createElement("script");
        script.src = "flutter_bootstrap.js";
        script.async = true;
        document.body.appendChild(script);
      };
      if (window.__SEO_READY__) {
        run();
      } else {
        setTimeout(run, 600);
      }
    })();
  </script>
</body>
</html>
