name: Flutter CI

on:
  push:
    branches: [ main ]
  pull_request:

# Forward-compat with GitHub's migration away from Node 20 runtime for
# JavaScript-based actions. Safe to set today; becomes load-bearing once
# GitHub flips the default to Node 24.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4   # 🔥 هذا أهم تعديل

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.2'

      - name: Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Run tests
        run: flutter test
