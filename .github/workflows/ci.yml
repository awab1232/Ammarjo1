name: Zero Violation CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Run zero violation check
        run: bash .ci/zero_violation_check.sh

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Build
        run: flutter build apk --debug
